syntax = "proto3";

package auth.v1;

option go_package = "auth/api/gen/go/auth/v1;authv1";

// AuthService exposes internal auth operations for other microservices.
service AuthService {
  // ValidateToken checks a Bearer session token and returns the authenticated user.
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string role = 3;
}
